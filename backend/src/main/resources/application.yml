spring:
  application:
    name: P-Bot
  docker:
    compose:
      enabled: ${PBOT_COMPOSE_ENABLED:false}
      readiness:
        timeout: 10m
  ai:
    model:
      embedding: transformers
    embedding:
      transformer:
        cache:
          enabled: true
          directory: ${PBOT_TRANSFORMERS_CACHE_DIR:../.cache/spring-ai-transformers}
    vectorstore:
      qdrant:
        host: ${QDRANT_HOST:localhost}
        port: ${QDRANT_GRPC_PORT:6334}
        api-key: ${QDRANT_API_KEY:}
        collection-name: ${QDRANT_COLLECTION:pbot_docs}
        initialize-schema: true
        use-tls: ${QDRANT_USE_TLS:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info

pbot:
  llm:
    github:
      endpoint: ${PBOT_GITHUB_MODELS_ENDPOINT:https://models.github.ai/inference/chat/completions}
      token: ${GITHUB_TOKEN:}
      model: ${PBOT_GITHUB_MODEL:openai/gpt-4.1-mini}
      api-version: ${PBOT_GITHUB_API_VERSION:2026-03-10}
      temperature: ${PBOT_LLM_TEMPERATURE:0.2}
      max-tokens: ${PBOT_LLM_MAX_TOKENS:1200}
  rag:
    documents-path: ${PBOT_DOCS_PATH:../docs}
    top-k: ${PBOT_RAG_TOP_K:50}
    reranked-k: ${PBOT_RAG_RERANKED_K:8}
    similarity-threshold: ${PBOT_RAG_SIMILARITY_THRESHOLD:0.0}
    ingest-on-startup: ${PBOT_INGEST_ON_STARTUP:true}
    reranker-enabled: ${PBOT_RERANKER_ENABLED:true}
    reranker-url: ${PBOT_RERANKER_URL:http://localhost:8081/rerank}
